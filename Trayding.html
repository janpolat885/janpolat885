<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Full Screen Trading Chart</title>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background-color: #0f0f0f;
      overflow: hidden;
    }


    #tradingview_chart {
      width: 100%;
      height: 100vh;
    }
  </style>
</head>
<body>


<div id="tradingview_chart"></div>


<script>
new TradingView.widget({
  "autosize": true,
  "symbol": "BINANCE:BTCUSDT",
  "interval": "15",
  "timezone": "Asia/Tashkent",
  "theme": "dark",
  "style": "1",
  "locale": "en",
  "hide_top_toolbar": false,
  "hide_legend": false,
  "allow_symbol_change": true,
  "container_id": "tradingview_chart"
});
</script>


</body>
</html>
